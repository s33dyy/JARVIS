name: Build Windows Executable

on:
  workflow_dispatch:  # Allow manual triggering

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt || echo "No requirements.txt found, skipping."
        pip install playwright
        playwright install chromium
        
    # We might need to handle PyAudio differently on Windows, but pip install pyaudio usually works if wheels are available.
    - name: Install PyAudio and other dependencies
      run: |
        pip install pyaudio httpx
        
    - name: Build with PyInstaller
      run: |
        .\scripts\build_windows.ps1
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: JARVIS-Windows-Executable
        path: JARVIS.exe
