name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install \
            fastapi uvicorn python-socketio aiohttp httpx \
            google-genai pyaudio mediapipe opencv-python-headless \
            python-dotenv pillow psutil numpy \
            edge-tts faster-whisper \
            build123d \
            playwright kasa

      - name: Install Playwright browsers
        run: playwright install chromium

      - name: Build Python backend (PyInstaller)
        run: |
          cd backend
          pyinstaller jarvis.spec --distpath ../dist-py --workpath ../.pyibuild --noconfirm --clean

      - name: Bundle Playwright browsers
        run: bash scripts/bundle-playwright.sh

      - name: Install Node dependencies
        run: npm ci

      - name: Build React frontend
        run: npm run build

      - name: Build macOS app (arm64)
        run: npx electron-builder --mac --arm64 --publish never

      - name: Create DMG
        run: |
          hdiutil create -volname "J.A.R.V.I.S" \
            -srcfolder release/mac-arm64/J.A.R.V.I.S.app \
            -ov -format UDZO \
            "release/J.A.R.V.I.S-1.0.0-arm64.dmg"

      - name: Upload macOS build
        uses: softprops/action-gh-release@v2
        with:
          files: release/J.A.R.V.I.S-1.0.0-arm64.dmg
        if: startsWith(github.ref, 'refs/tags/')

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install `
            fastapi uvicorn python-socketio aiohttp httpx `
            google-genai pyaudio mediapipe opencv-python-headless `
            python-dotenv pillow psutil numpy `
            edge-tts faster-whisper `
            build123d `
            playwright kasa

      - name: Install Playwright browsers
        run: playwright install chromium

      - name: Build Python backend (PyInstaller)
        run: |
          cd backend
          pyinstaller jarvis.spec --distpath ../dist-py --workpath ../.pyibuild --noconfirm --clean

      - name: Bundle Playwright browsers
        run: powershell scripts/bundle-playwright.ps1

      - name: Install Node dependencies
        run: npm ci

      - name: Build React frontend
        run: npm run build

      - name: Build Windows installer
        run: npx electron-builder --win --publish never

      - name: Upload Windows build
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.exe
        if: startsWith(github.ref, 'refs/tags/')
